# Datasource configuration
# If SUPABASE_DB_URL is provided, the app uses Supabase/PostgreSQL.
# Otherwise it falls back to a local H2 database so the backend can boot in local dev without extra env vars.
spring.datasource.url=${SUPABASE_DB_URL:jdbc:h2:file:./data/workspace-booking;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE}
spring.datasource.username=${SUPABASE_DB_USER:sa}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
