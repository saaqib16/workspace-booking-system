# Supabase / PostgreSQL connection
# Preferred: set SUPABASE_DB_URL to the full JDBC URL from Supabase.
# Fallback: set SUPABASE_DB_HOST, SUPABASE_DB_PORT, and SUPABASE_DB_NAME.
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}?sslmode=require}
spring.datasource.username=${SUPABASE_DB_USER:}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
