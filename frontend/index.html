<!DOCTYPE html>
<html>
<head>
    <title>Workspace Booking System</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h2 class="text-center mb-4">Meeting Room Booking</h2>

<!-- Room List -->
<h4>Available Rooms</h4>
<ul id="roomList" class="list-group mb-4"></ul>

<!-- Booking Form -->
<h4>Book a Room</h4>

<form id="bookingForm">

    <input type="number" id="userId" class="form-control mb-2" placeholder="User ID" required>

    <input type="number" id="roomId" class="form-control mb-2" placeholder="Room ID" required>

    <input type="date" id="date" class="form-control mb-2" required>

    <input type="time" id="startTime" class="form-control mb-2" required>

    <input type="time" id="endTime" class="form-control mb-2" required>

    <button class="btn btn-primary">Book Room</button>
</form>

<script src="script.js"></script>

</body>
</html>
