<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Workspace Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="d-flex flex-column" style="min-height: 100vh;">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark pb-3 pt-4 px-4" style="background: transparent;">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold fs-3" href="#"><i class="bi bi-layers-fill text-primary me-2"></i>SmartSpace</a>
        <div>
            <a href="login.html" class="btn btn-outline-light me-2 rounded-pill px-4">Login</a>
            <a href="register.html" class="btn btn-primary rounded-pill px-4">Get Started</a>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<div class="container flex-grow-1 d-flex align-items-center mb-5 pb-5">
    <div class="row w-100 align-items-center">
        <div class="col-lg-6 mb-5 mb-lg-0 z-10" style="z-index: 10;">
            <h1 class="display-3 fw-bolder mb-4" style="line-height: 1.2;">
                Book Your Ideal <br>
                <span style="background: -webkit-linear-gradient(135deg, #a855f7, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Workspace</span><br>
                In Seconds.
            </h1>
            <p class="lead text-white-50 mb-5" style="max-width: 500px; font-size: 1.25rem;">
                A smart, seamless, and intuitive way to manage meeting rooms and workspace resources for modern teams.
            </p>
            <div class="d-flex gap-3">
                <a href="register.html" class="btn btn-primary btn-lg rounded-pill px-5 shadow-lg fw-bold">Start Booking</a>
                <a href="login.html" class="btn btn-outline-light btn-lg rounded-pill px-4 fw-bold">Sign In</a>
            </div>
        </div>
        <div class="col-lg-6 d-flex justify-content-center position-relative">
            <!-- decorative glass panel -->
            <div class="glass-card shadow-lg p-4 position-relative" style="width: 100%; max-width: 500px; aspect-ratio: 4/3; transform: rotate(2deg);">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0">Upcoming Meeting</h5>
                    <span class="badge bg-success rounded-pill px-3 py-2">Confirmed</span>
                </div>
                <div class="d-flex align-items-center gap-3 mb-4 p-3 rounded" style="background: rgba(255,255,255,0.05);">
                    <div class="bg-primary rounded p-3 text-center" style="width: 60px;">
                        <span class="d-block fw-bold fs-5">28</span>
                        <small class="text-white-50">Oct</small>
                    </div>
                    <div>
                        <h6 class="mb-1 fw-bold fs-5">Boardroom A</h6>
                        <p class="mb-0 text-white-50 small"><i class="bi bi-clock me-1"></i> 10:00 AM - 11:30 AM</p>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-auto">
                    <div class="d-flex gx-2">
                        <img src="https://i.pravatar.cc/100?img=11" class="rounded-circle border border-2 border-dark" width="40" alt="Avatar">
                        <img src="https://i.pravatar.cc/100?img=12" class="rounded-circle border border-2 border-dark" width="40" alt="Avatar" style="margin-left: -10px;">
                        <img src="https://i.pravatar.cc/100?img=13" class="rounded-circle border border-2 border-dark" width="40" alt="Avatar" style="margin-left: -10px;">
                    </div>
                    <button class="btn btn-sm btn-outline-light rounded-pill px-3">View Details</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Background Elements -->
<div style="position: absolute; top: -5%; right: -5%; width: 500px; height: 500px; background: radial-gradient(circle, #4f46e5, transparent 70%); border-radius: 50%; filter: blur(100px); opacity: 0.4; z-index: -1;"></div>
<div style="position: absolute; bottom: -10%; left: -10%; width: 600px; height: 600px; background: radial-gradient(circle, #9333ea, transparent 70%); border-radius: 50%; filter: blur(120px); opacity: 0.3; z-index: -1;"></div>

<script>
    // Redirect if already logged in
    const user = JSON.parse(localStorage.getItem("user"));
    if (user) {
        window.location.href = "dashboard.html";
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
