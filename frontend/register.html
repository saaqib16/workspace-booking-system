<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Workspace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="glass-card" style="width: 100%; max-width: 480px; z-index: 10; margin-top: 2rem; margin-bottom: 2rem;">
    <div class="text-center mb-4">
        <i class="bi bi-person-plus text-primary" style="font-size: 2.5rem; background: -webkit-linear-gradient(135deg, #a855f7, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
        <h2 class="fw-bold mt-2">Create Account</h2>
        <p class="text-white-50">Join the smart workspace system</p>
    </div>
    
    <form id="registerForm">
        <div class="form-floating mb-3">
            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
            <label for="name">Full Name</label>
        </div>

        <div class="form-floating mb-3">
            <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
            <label for="email">Email address</label>
        </div>
        
        <div class="form-floating mb-3">
            <input type="password" id="password" class="form-control" placeholder="Password" required>
            <label for="password">Password</label>
        </div>

        <div class="form-floating mb-4">
            <select id="role" class="form-select">
                <option value="EMPLOYEE">Employee</option>
                <option value="ADMIN">Administrator</option>
            </select>
            <label for="role">Account Type</label>
        </div>
        
        <button class="btn btn-primary w-100 py-3 mb-3 fw-bold fs-5">Register Account</button>
        <p class="text-center mb-0 text-white-50">Already have an account? <a href="login.html" class="text-white fw-bold text-decoration-none border-bottom border-primary">Sign In</a></p>
    </form>
</div>

<!-- Decorative background elements -->
<div style="position: fixed; top: -10%; right: -5%; width: 400px; height: 400px; background: radial-gradient(circle, #3b82f6, transparent 70%); border-radius: 50%; filter: blur(80px); opacity: 0.4; z-index: 0;"></div>
<div style="position: fixed; bottom: -5%; left: 0%; width: 350px; height: 350px; background: radial-gradient(circle, #10b981, transparent 70%); border-radius: 50%; filter: blur(90px); opacity: 0.3; z-index: 0;"></div>

<script src="config.js"></script>
<script>
    const API = window.APP_CONFIG.API_BASE_URL + "/auth";
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const user = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            role: document.getElementById("role").value
        };
        const btn = document.querySelector('button');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Creating Account...';
        btn.disabled = true;

        try {
            const res = await fetch(`${API}/register`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(user)
            });
            if (!res.ok) {
                const err = await res.json();
                alert(err.message || JSON.stringify(err));
                btn.innerHTML = 'Register Account';
                btn.disabled = false;
                return;
            }
            window.location.href = "login.html";
        } catch (err) {
            alert("Error connecting to server. Please try again.");
            btn.innerHTML = 'Register Account';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
