<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Workspace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="d-flex flex-column" style="min-height: 100vh;">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-opacity-25 border-bottom border-secondary border-opacity-25 sticky-top backdrop-blur">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#"><i class="bi bi-layers-fill text-primary me-2"></i>SmartSpace</a>
        <div class="d-flex align-items-center gap-3">
            <span id="navUserInfo" class="text-white-50 small d-none d-md-block"></span>
            <button class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
        </div>
    </div>
</nav>

<div class="container py-5 flex-grow-1">
    
    <div class="row mb-5 align-items-center">
        <div class="col-md-8">
            <h2 class="fw-bold mb-1" id="welcomeText">Welcome</h2>
            <p class="text-white-50 mb-0">Manage your workspace bookings and availability.</p>
        </div>
        <div class="col-md-4 text-md-end mt-4 mt-md-0" id="adminToggleContainer" style="display: none;">
            <ul class="nav nav-pills d-inline-flex bg-dark bg-opacity-50 p-1 rounded-pill blur-bg shadow-sm" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active px-4 rounded-pill" id="rooms-tab" data-bs-toggle="pill" data-bs-target="#rooms-pane" type="button" role="tab">Workspaces</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link px-4 rounded-pill" id="admin-tab" data-bs-toggle="pill" data-bs-target="#admin-pane" type="button" role="tab">Analytics</button>
                </li>
            </ul>
        </div>
    </div>

    <div class="tab-content">
        <!-- Rooms Pane (For Everyone) -->
        <div class="tab-pane fade show active" id="rooms-pane" role="tabpanel" tabindex="0">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">Available Workspaces</h4>
                <span class="badge bg-primary rounded-pill px-3 py-2 fs-6 shadow-sm" id="roomCount"></span>
            </div>
            
            <div class="row g-4" id="roomGrid">
                <!-- Rooms injected here -->
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
                    <p class="mt-3 text-white-50 fw-semibold">Loading available workspaces...</p>
                </div>
            </div>
        </div>

        <!-- Admin Pane -->
        <div class="tab-pane fade" id="admin-pane" role="tabpanel" tabindex="0">
            
            <div class="row g-4 mb-4">
                <div class="col-md-6 col-lg-4">
                    <div class="glass-card h-100 p-4 text-center d-flex flex-column justify-content-center">
                        <h6 class="text-white-50 fw-bold text-uppercase mb-3">Total Bookings</h6>
                        <h2 class="display-3 fw-bold text-primary mb-0" id="totalBookings">0</h2>
                    </div>
                </div>
                <div class="col-md-6 col-lg-4">
                    <div class="glass-card h-100 p-4 text-center d-flex flex-column justify-content-center">
                        <h6 class="text-white-50 fw-bold text-uppercase mb-3">Most Popular Room</h6>
                        <h2 class="display-4 fw-bold text-success mb-0 text-truncate" id="mostUsedRoom">-</h2>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="glass-card h-100 p-4">
                        <h6 class="text-white-50 fw-bold text-uppercase mb-4"><i class="bi bi-plus-circle me-2 text-primary"></i>Add New Room</h6>
                        <form id="addRoomForm" onsubmit="addRoom(event)">
                            <div class="form-floating mb-3">
                                <input type="text" id="roomName" class="form-control" placeholder="Room Name" required>
                                <label for="roomName">Room Name</label>
                            </div>
                            <div class="row g-2 mb-4">
                                <div class="col-6 form-floating">
                                    <input type="number" id="capacity" class="form-control" placeholder="Capacity" required>
                                    <label for="capacity">Capacity</label>
                                </div>
                                <div class="col-6 form-floating">
                                    <input type="text" id="location" class="form-control" placeholder="Location" required>
                                    <label for="location">Location</label>
                                </div>
                            </div>
                            <button class="btn btn-primary w-100 py-3 fw-bold"><i class="bi bi-plus-lg me-2"></i>Create Workspace</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="glass-card p-4 h-100">
                        <h5 class="fw-bold mb-4"><i class="bi bi-bar-chart-line me-2 text-primary"></i>Room Usage Dashboard</h5>
                        <div style="height: 350px;">
                            <canvas id="chart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="glass-card p-4 h-100">
                        <h5 class="fw-bold mb-4"><i class="bi bi-list-stars me-2 text-primary"></i>Usage Details</h5>
                        <ul id="roomUsage" class="list-group list-group-flush bg-transparent gap-2"></ul>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Background Elements -->
<div style="position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.15), transparent 60%), radial-gradient(circle at 85% 30%, rgba(147, 51, 234, 0.15), transparent 60%); z-index: -1; pointer-events: none;"></div>

<!-- Booking Modal -->
<div class="modal fade" id="bookingModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg">
      <div class="modal-header border-bottom border-light border-opacity-10 py-3 px-4">
        <h5 class="modal-title fw-bold fs-4">Book <span id="modalRoomName" class="text-primary"></span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
        <form id="bookingForm" onsubmit="submitBooking(event)">
            <input type="hidden" id="modalRoomId">
            <div class="form-floating mb-3">
                <input type="date" id="bookingDate" class="form-control" required>
                <label for="bookingDate">Date</label>
            </div>
            <div class="row g-3 mb-4">
                <div class="col-6 form-floating">
                    <input type="time" id="bookingStartTime" class="form-control" required>
                    <label for="bookingStartTime">Start Time</label>
                </div>
                <div class="col-6 form-floating">
                    <input type="time" id="bookingEndTime" class="form-control" required>
                    <label for="bookingEndTime">End Time</label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold fs-5 shadow" id="confirmBookBtn"><i class="bi bi-calendar-check me-2"></i>Confirm Booking</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="config.js"></script>
<script>
    const API = window.APP_CONFIG.API_BASE_URL;
    let chartInstance = null;
    const bookingModal = new bootstrap.Modal(document.getElementById('bookingModal'));

    // Auth check
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    // Setup UI for user
    document.getElementById("welcomeText").innerText = `Welcome, ${user.name.split(' ')[0]}`;
    document.getElementById("navUserInfo").innerText = `${user.name} • ${user.role}`;

    if (user.role === "ADMIN") {
        document.getElementById("adminToggleContainer").style.display = "block";
    }

    function logout() {
        localStorage.removeItem("user");
        window.location.href = "login.html";
    }

    async function loadRooms() {
        try {
            const [roomRes, bookingRes] = await Promise.all([
                fetch(`${API}/rooms`),
                fetch(`${API}/bookings`)
            ]);
            
            const rooms = await roomRes.json();
            const bookings = await bookingRes.json();
            
            const grid = document.getElementById("roomGrid");
            grid.innerHTML = "";
            document.getElementById("roomCount").innerText = `${rooms.length} Workspaces`;

            const now = new Date();
            const currentDate = now.toISOString().split("T")[0];
            const currentTime = now.toTimeString().split(" ")[0];

            rooms.forEach(room => {
                let isBookedNow = false;
                bookings.forEach(b => {
                    if (b.roomId === room.id && b.date === currentDate && currentTime >= b.startTime && currentTime <= b.endTime) {
                        isBookedNow = true;
                    }
                });

                const statusClass = isBookedNow ? 'status-booked' : 'status-available';
                const statusIcon = isBookedNow ? 'bi-x-circle-fill' : 'bi-check-circle-fill';
                const statusText = isBookedNow ? 'Occupied' : 'Available';

                const adminControls = user.role === "ADMIN" 
                    ? `<button class="btn btn-sm btn-outline-danger mt-3 w-100 rounded-3 fw-semibold" onclick="deleteRoom(${room.id})"><i class="bi bi-trash me-2"></i>Remove</button>`
                    : '';

                const cardHtml = `
                    <div class="col-md-6 col-lg-4">
                        <div class="room-card p-4 d-flex flex-column h-100">
                            <div class="d-flex justify-content-between align-items-start mb-4">
                                <div>
                                    <h4 class="fw-bold mb-1">${room.roomName}</h4>
                                    <p class="text-white-50 small mb-0"><i class="bi bi-geo-alt me-1 text-primary"></i>${room.location}</p>
                                </div>
                                <span class="status-badge ${statusClass} shadow-sm"><i class="bi ${statusIcon} me-1"></i>${statusText}</span>
                            </div>
                            <div class="d-flex gap-3 mb-4 mt-auto">
                                <div class="text-center px-3 py-2 rounded-3" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
                                    <i class="bi bi-people-fill text-primary mb-1 d-block fs-5"></i>
                                    <span class="small text-white-50 fw-semibold">${room.capacity} Seats</span>
                                </div>
                                <div class="text-center px-3 py-2 rounded-3 flex-grow-1" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
                                    <i class="bi bi-door-closed-fill text-primary mb-1 d-block fs-5"></i>
                                    <span class="small text-white-50 fw-semibold">Identifier #${room.id}</span>
                                </div>
                            </div>
                            <div>
                                <button class="btn btn-primary w-100 fw-bold py-2 rounded-3 shadow-sm" onclick="openBookingModal(${room.id}, '${room.roomName}')" ${isBookedNow ? 'disabled title="Currently occupied"' : ''}>
                                    <i class="bi bi-calendar-plus me-2"></i>Book Now
                                </button>
                                ${adminControls}
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            });
        } catch (err) {
            document.getElementById("roomGrid").innerHTML = `<div class="col-12 text-center text-danger"><i class="bi bi-exclamation-triangle-fill fs-3 d-block mb-2"></i>Failed to load workspaces. Is the backend running?</div>`;
        }
    }

    function openBookingModal(id, name) {
        document.getElementById("modalRoomId").value = id;
        document.getElementById("modalRoomName").innerText = name;
        document.getElementById('bookingForm').reset();
        
        // Auto-set today's date
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('bookingDate').value = today;
        
        bookingModal.show();
    }

    async function submitBooking(e) {
        e.preventDefault();
        const btn = document.getElementById('confirmBookBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing...';
        btn.disabled = true;

        const booking = {
            userId: user.id,
            roomId: document.getElementById("modalRoomId").value,
            date: document.getElementById("bookingDate").value,
            startTime: document.getElementById("bookingStartTime").value + ":00",
            endTime: document.getElementById("bookingEndTime").value + ":00"
        };

        try {
            const res = await fetch(`${API}/bookings`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(booking)
            });

            if (!res.ok) {
                const err = await res.json();
                alert(err.message || "Failed to book room.");
            } else {
                alert("Workspace booked successfully! ✅");
                bookingModal.hide();
                loadRooms(); // Refresh UI
            }
        } catch (err) {
            alert("Connection error.");
        } finally {
            btn.innerHTML = '<i class="bi bi-calendar-check me-2"></i>Confirm Booking';
            btn.disabled = false;
        }
    }

    async function addRoom(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
        btn.disabled = true;

        const room = {
            roomName: document.getElementById("roomName").value,
            capacity: document.getElementById("capacity").value,
            location: document.getElementById("location").value
        };

        try {
            const res = await fetch(`${API}/rooms`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(room)
            });
            if (res.ok) {
                document.getElementById('addRoomForm').reset();
                loadRooms();
                loadAnalytics();
            } else {
                alert("Failed to create room.");
            }
        } catch (err) { alert("Error adding room"); }
        
        btn.innerHTML = originalText;
        btn.disabled = false;
    }

    async function deleteRoom(id) {
        if(!confirm("Are you sure you want to permanently delete this workspace?")) return;
        try {
            await fetch(`${API}/rooms/${id}`, { method: "DELETE" });
            loadRooms();
            loadAnalytics();
        } catch (err) { alert("Error deleting room"); }
    }

    async function loadAnalytics() {
        if (user.role !== "ADMIN") return;
        try {
            const res = await fetch(`${API}/analytics`);
            const data = await res.json();

            document.getElementById("totalBookings").innerText = data.totalBookings;
            document.getElementById("mostUsedRoom").innerText = data.mostUsedRoom ? `Room ${data.mostUsedRoom}` : "None";

            const usageList = document.getElementById("roomUsage");
            usageList.innerHTML = "";
            for (let roomId in data.roomUsage) {
                usageList.innerHTML += `<li class="list-group-item bg-transparent text-white border-bottom border-secondary border-opacity-50 d-flex justify-content-between align-items-center py-3">
                    <span class="fw-semibold"><i class="bi bi-check-circle-fill me-3 text-success"></i>Workspace #${roomId}</span>
                    <span class="badge bg-primary text-white rounded-pill px-3 py-2 fs-6 shadow-sm">${data.roomUsage[roomId]} Uses</span>
                </li>`;
            }

            drawChart(data);
        } catch (err) { console.error("Failed to load analytics"); }
    }

    function drawChart(data) {
        const ctx = document.getElementById('chart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        Chart.defaults.color = 'rgba(255, 255, 255, 0.7)';
        Chart.defaults.font.family = "'Inter', sans-serif";
        
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(data.roomUsage).map(id => `Room ${id}`),
                datasets: [{
                    label: 'Total Bookings',
                    data: Object.values(data.roomUsage),
                    backgroundColor: 'rgba(168, 85, 247, 0.8)',
                    borderColor: 'rgba(168, 85, 247, 1)',
                    borderWidth: 1,
                    borderRadius: 8,
                    hoverBackgroundColor: 'rgba(192, 132, 252, 0.9)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255, 255, 255, 0.05)', drawBorder: false },
                        ticks: { stepSize: 1 }
                    },
                    x: { 
                        grid: { display: false, drawBorder: false } 
                    }
                },
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(15, 23, 42, 0.9)',
                        titleColor: '#fff',
                        bodyColor: '#c084fc',
                        padding: 12,
                        cornerRadius: 8,
                        displayColors: false
                    }
                }
            }
        });
    }

    // Initialize
    loadRooms();
    if (user.role === "ADMIN") {
        document.getElementById('admin-tab').addEventListener('shown.bs.tab', loadAnalytics);
    }
</script>
</body>
</html>
