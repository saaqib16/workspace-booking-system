<!DOCTYPE html>
<html>
<head>
    <title>Workspace Pro Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: linear-gradient(180deg, #1e293b, #0f172a);
            padding: 20px;
        }

        .sidebar h4 {
            font-weight: 700;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            color: #cbd5f5;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #3b82f6;
            color: white;
            transform: translateX(5px);
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 25px;
            animation: fadeIn 0.6s ease-in-out;
        }

        /* CARDS */
        .card {
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
        }

        /* BUTTON */
        .btn-primary {
            background: #3b82f6;
            border: none;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        /* INPUT */
        input {
            background: #1e293b !important;
            color: white !important;
            border: none !important;
        }

        input::placeholder {
            color: #94a3b8;
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1;}
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>🚀 Workspace</h4>

    <a href="#">🏠 Dashboard</a>
    <a href="#">📅 Bookings</a>
    <a href="#">🏢 Rooms</a>
    <a href="#">📊 Analytics</a>

    <hr>

    <button class="btn btn-danger w-100" onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

    <h3 class="mb-4">Dashboard Overview</h3>

    <!-- KPI CARDS -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card p-3">
                <h6>Total Bookings</h6>
                <h2 id="totalBookings"></h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h6>Most Used Room</h6>
                <h2 id="mostUsedRoom"></h2>
            </div>
        </div>

    </div>

    <!-- GRID -->
    <div class="row">

        <!-- ROOMS -->
        <div class="col-md-6">
            <div class="card p-3 mb-4">
                <h5>Available Rooms</h5>
                <ul id="roomList" class="list-group"></ul>
            </div>
        </div>

        <!-- BOOK -->
        <div class="col-md-6">
            <div class="card p-3 mb-4">
                <h5>Book Room</h5>

                <input type="number" id="roomId" class="form-control mb-2" placeholder="Room ID">
                <input type="date" id="date" class="form-control mb-2">
                <input type="time" id="startTime" class="form-control mb-2">
                <input type="time" id="endTime" class="form-control mb-2">

                <button class="btn btn-primary w-100" onclick="bookRoom()">Book</button>
            </div>
        </div>

    </div>

    <!-- CHART -->
    <div class="card p-3">
        <h5>📊 Room Usage</h5>
        <canvas id="chart"></canvas>
    </div>

</div>

<script>

    const API = "/api";
    const user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        window.location.href = "login.html";
    }

    function logout() {
        localStorage.removeItem("user");
        window.location.href = "login.html";
    }

    async function loadRooms() {
        const res = await fetch(`${API}/rooms`);
        const rooms = await res.json();

        const list = document.getElementById("roomList");
        list.innerHTML = "";

        rooms.forEach(room => {
            const li = document.createElement("li");
            li.className = "list-group-item bg-dark text-white";
            li.innerText = `Room ${room.id}: ${room.roomName}`;
            list.appendChild(li);
        });
    }

    async function bookRoom() {
        const booking = {
            userId: user.id,
            roomId: document.getElementById("roomId").value,
            date: document.getElementById("date").value,
            startTime: document.getElementById("startTime").value + ":00",
            endTime: document.getElementById("endTime").value + ":00"
        };

        const res = await fetch(`${API}/bookings`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(booking)
        });

        if (!res.ok) {
            const err = await res.json();
            alert(err.message);
            return;
        }

        alert("✅ Booking Successful");
    }

    async function loadAnalytics() {
        const res = await fetch(`${API}/analytics`);
        const data = await res.json();

        document.getElementById("totalBookings").innerText = data.totalBookings;
        document.getElementById("mostUsedRoom").innerText = data.mostUsedRoom;

        drawChart(data);
    }

    function drawChart(data) {
        new Chart(document.getElementById("chart"), {
            type: 'bar',
            data: {
                labels: Object.keys(data.roomUsage),
                datasets: [{
                    label: 'Bookings',
                    data: Object.values(data.roomUsage)
                }]
            }
        });
    }

    loadRooms();
    loadAnalytics();

</script>

</body>
</html>
