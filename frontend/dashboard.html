<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>



    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="container mt-4">

<h2 class="text-center">Workspace Dashboard</h2>

<p id="userInfo" class="text-center"></p>

<button class="btn btn-danger mb-3" onclick="logout()">Logout</button>

<hr>

<!-- ADMIN SECTION -->
<div id="adminSection" style="display:none;">

    <h4>Add Room</h4>

    <input type="text" id="roomName" placeholder="Room Name" class="form-control mb-2">
    <input type="number" id="capacity" placeholder="Capacity" class="form-control mb-2">
    <input type="text" id="location" placeholder="Location" class="form-control mb-2">

    <button class="btn btn-success mb-3" onclick="addRoom()">Add Room</button>

</div>
<hr>

<h4>📊 Analytics</h4>

<p>Total Bookings: <span id="totalBookings"></span></p>
<p>Most Used Room ID: <span id="mostUsedRoom"></span></p>

<ul id="roomUsage"></ul>

<canvas id="chart" width="400" height="200"></canvas>
<hr>

<!-- ROOM LIST -->
<h4>Available Rooms</h4>
<ul id="roomList" class="list-group mb-4"></ul>

<!-- BOOKING SECTION -->
<h4>Book Room</h4>

<input type="number" id="roomId" placeholder="Room ID" class="form-control mb-2">
<input type="date" id="date" class="form-control mb-2">
<input type="time" id="startTime" class="form-control mb-2">
<input type="time" id="endTime" class="form-control mb-2">

<button class="btn btn-primary" onclick="bookRoom()">Book</button>

<script src="config.js"></script>
<script>


    const API = window.APP_CONFIG.API_BASE_URL;

    const user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        window.location.href = "login.html";
    }

    // Show user info
    document.getElementById("userInfo").innerText =
        `Welcome ${user.name} (${user.role})`;

    // Show admin section
    if (user.role === "ADMIN") {
        document.getElementById("adminSection").style.display = "block";
    }

    // Logout
    function logout() {
        localStorage.removeItem("user");
        window.location.href = "login.html";
    }


    // Load rooms
    async function loadRooms() {

    const roomRes = await fetch(`${API}/rooms`);
    const rooms = await roomRes.json();

    const bookingRes = await fetch(`${API}/bookings`);
    const bookings = await bookingRes.json();

    const list = document.getElementById("roomList");
    list.innerHTML = "";

    rooms.forEach(room => {

        let status = "Available ✅";

        // Check if room is booked NOW
        const now = new Date();
        const currentDate = now.toISOString().split("T")[0];
        const currentTime = now.toTimeString().split(" ")[0];

        bookings.forEach(b => {

            if (
                b.roomId === room.id &&
                b.date === currentDate &&
                currentTime >= b.startTime &&
                currentTime <= b.endTime
            ) {
                status = "Booked ❌";
            }
        });



        const li = document.createElement("li");
        li.className = "list-group-item";

        li.innerText =
            `ID:${room.id} | ${room.roomName} (${room.capacity}) - ${room.location} → ${status}`;

        // Admin delete button
        if (user.role === "ADMIN") {
            const btn = document.createElement("button");
            btn.innerText = "Delete";
            btn.className = "btn btn-danger btn-sm float-end";

            btn.onclick = () => deleteRoom(room.id);

            li.appendChild(btn);
        }

        list.appendChild(li);
    });
}

    async function loadAnalytics() {

    const res = await fetch(`${API}/analytics`);
    const data = await res.json();

    document.getElementById("totalBookings").innerText =
        data.totalBookings;

    document.getElementById("mostUsedRoom").innerText =
        data.mostUsedRoom;

    const usageList = document.getElementById("roomUsage");
    usageList.innerHTML = "";

    for (let roomId in data.roomUsage) {
        const li = document.createElement("li");
        li.innerText = `Room ${roomId}: ${data.roomUsage[roomId]} bookings`;
        usageList.appendChild(li);
    }

    // ✅ DRAW CHART
    drawChart(data);
}
    function drawChart(data) {

    const ctx = document.getElementById('chart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: Object.keys(data.roomUsage),
            datasets: [{
                label: 'Bookings per Room',
                data: Object.values(data.roomUsage)
            }]
        }
    });
}
    // Add room (Admin)
    async function addRoom() {

        const room = {
            roomName: document.getElementById("roomName").value,
            capacity: document.getElementById("capacity").value,
            location: document.getElementById("location").value
        };

        await fetch(`${API}/rooms`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(room)
        });

        alert("Room Added ✅");
        loadRooms();
    }

    // Delete room
    async function deleteRoom(id) {

        await fetch(`${API}/rooms/${id}`, {
            method: "DELETE"
        });

        alert("Room Deleted ❌");
        loadRooms();
    }

    // Book room
    async function bookRoom() {

        const booking = {
            userId: user.id,
            roomId: document.getElementById("roomId").value,
            date: document.getElementById("date").value,
            startTime: document.getElementById("startTime").value + ":00",
            endTime: document.getElementById("endTime").value + ":00"
        };

        const res = await fetch(`${API}/bookings`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(booking)
        });

        if (!res.ok) {
            const err = await res.json();
            alert(err.message || JSON.stringify(err));
            return;
        }

        alert("Booking Successful ✅");
    }

    // Load rooms on start
    loadRooms();
    loadAnalytics();

</script>

</body>
</html>
