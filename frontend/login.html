<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2 class="text-center">Login</h2>

<form id="loginForm">

    <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>

    <input type="password" id="password" class="form-control mb-2" placeholder="Password" required>

    <button class="btn btn-primary w-100">Login</button>

</form>

<script src="config.js"></script>
<script>
    const API = window.APP_CONFIG.API_BASE_URL + "/auth";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {

        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const res = await fetch(`${API}/login?email=${email}&password=${password}`, {
            method: "POST"
        });

        if (!res.ok) {
            const err = await res.json();
            alert(err.message || JSON.stringify(err));
            return;
        }

        const user = await res.json();

        // Save user in browser
        localStorage.setItem("user", JSON.stringify(user));

        // Redirect
        window.location.href = "dashboard.html";
    });
</script>

</body>
</html>
